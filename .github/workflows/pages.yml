name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install wasm-bindgen
        run: cargo install wasm-bindgen-cli --version 0.2.121 --locked

      - name: Build web app
        run: ./scripts/build-web.sh dist

      - name: Check web artifact
        run: ./scripts/check-web-dist.mjs dist

      - name: Smoke test web app
        run: |
          python3 -m http.server 4173 --directory dist &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for _ in {1..40}; do
            if curl --fail --silent --output /dev/null http://127.0.0.1:4173/; then
              break
            fi
            sleep 0.25
          done
          ./scripts/check-web-smoke.mjs http://127.0.0.1:4173/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Check deployed Pages artifact
        run: |
          for _ in {1..20}; do
            if ./scripts/check-web-live.mjs "${{ steps.deployment.outputs.page_url }}"; then
              exit 0
            fi
            sleep 3
          done
          ./scripts/check-web-live.mjs "${{ steps.deployment.outputs.page_url }}"

      - name: Smoke test deployed Pages app
        run: ./scripts/check-web-smoke.mjs "${{ steps.deployment.outputs.page_url }}"
